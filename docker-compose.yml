version: '3.8'

services:
  backend:
    build: ./backend
    container_name: chat-backend
    ports:
      - "8888:8888"
    environment:
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}

  frontend:
    build: ./frontend
    container_name: chat-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
